<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>epsOS</title>
<style>
body {
    background: black;
    color: #ff7a00;
    font-family: "Courier New", monospace;
    font-size: 22px;
    padding: 20px;
}
h1 {
    font-size: 48px;
    margin-bottom: 40px;
}
.cursor {
    display: inline-block;
    width: 10px;
    animation: blink 0.8s steps(1) infinite;
}
@keyframes blink {
    50% { opacity: 0; }
}
.hidden-box {
    display: none;
    border: 2px solid #ff7a00;
    padding: 10px;
    margin-top: 5px;
    font-size: 16px;
    white-space: pre-wrap;
    background: #111;
}
.epsButton {
    background: black;
    color: #ff7a00;
    border: 2px solid #ff7a00;
    padding: 5px 10px;
    font-family: "Courier New", monospace;
    font-size: 18px;
    cursor: pointer;
    margin-top: 10px;
    margin-right: 5px;
}
.epsButton:hover {
    background: #111;
}
.pointer {
    cursor: pointer;
}
#systemBroadcast {
    margin-top: 20px;
    border: 2px dashed #ff7a00;
    padding: 10px;
    font-size: 16px;
}
#messageList {
    max-height: 200px;
    overflow-y: auto;
}
</style>
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div style="border: 2px solid #ff7a00; padding: 5px;">
    <h1>epsOS</h1>
    <p style="font-size: 14px;">ver 1.0</p>
    <p id="currentNick" style="text-align: right; font-size: 14px;">nickname: guest</p>

    <button id="openForm" class="epsButton">Sign_Up</button>
    <button id="changeNickBtn" class="epsButton" style="display: none;">Change_Nick</button>
    <button id="logoutBtn" class="epsButton" style="display: none;">Log_Out</button>

    <div id="regForm" class="hidden-box">
        <input type="text" id="nicknameInput" placeholder="name"
        style="width: calc(100% - 14px); background: black; color: #ff7a00; border: 2px solid #ff7a00; font-family: 'Courier New', monospace; font-size: 18px; padding: 5px; margin: 5px 0;">
        <input type="password" id="passwordInput" placeholder="password"
        style="width: calc(100% - 14px); background: black; color: #ff7a00; border: 2px solid #ff7a00; font-family: 'Courier New', monospace; font-size: 18px; padding: 5px; margin: 5px 0;">
        <button id="submitReg" class="epsButton">register</button>
    </div>
</div>

<p style="margin-top: 20px;">Users Online:</p>
<div id="usersListDisplay"><div>*None</div></div>

<div id="systemBroadcast">
    <p style="margin: 0 0 10px 0; font-weight: bold;">[SYSTEM BROADCAST CHANNEL]</p>
    <div id="messageList">Ожидание входящих директив...</div>
    
    <div id="adminPanel" style="margin-top: 15px; display: none;">
        <input type="text" id="broadcastInput" placeholder="Введите системное сообщение..." 
        style="width: 70%; background: black; color: #ff7a00; border: 2px solid #ff7a00; font-family: 'Courier New', monospace; font-size: 16px; padding: 5px;">
        <button id="sendBroadcast" class="epsButton" style="margin: 0;">SEND</button>
    </div>
</div>

<script>
const socket = io();
let myNickname = "guest";

const openFormBtn = document.getElementById('openForm');
const changeNickBtn = document.getElementById('changeNickBtn');
const logoutBtn = document.getElementById('logoutBtn');
const regForm = document.getElementById('regForm');
const submitRegBtn = document.getElementById('submitReg');
const usersListDisplay = document.getElementById('usersListDisplay');
const messageList = document.getElementById('messageList');
const adminPanel = document.getElementById('adminPanel');

// Ставим заглушку для гостей при первой загрузке страницы
messageList.innerHTML = '<div style="color: #666; font-style: italic;">Зайдите в аккаунт, чтобы увидеть все.</div>';

// Открытие и закрытие формы по кнопке Sign_Up
openFormBtn.addEventListener('click', function() {
    regForm.style.display = (regForm.style.display === 'block') ? 'none' : 'block';
});

// Отправка данных на сервер по кнопке register
submitRegBtn.addEventListener('click', function() {
    const nickname = document.getElementById('nicknameInput').value.trim();
    const password = document.getElementById('passwordInput').value.trim();

    if (!nickname || !password) {
        alert("error: no password or name");
        return;
    }
    socket.emit('register_user', { nickname, password });
});

// Успешный вход
socket.on('registration_success', function(data) {
    myNickname = data.nickname;
    document.getElementById('currentNick').textContent = "nickname: " + myNickname;
    regForm.style.display = 'none';
    
    openFormBtn.style.display = 'none';
    changeNickBtn.style.display = 'inline-block';
    logoutBtn.style.display = 'inline-block';
    
    // Просим у сервера историю, так как мы залогинились
    messageList.innerHTML = 'Загрузка директив...';
    socket.emit('request_history'); 
    
    // Проверка на твой ник IV для открытия админки
    if (myNickname.toLowerCase() === 'iv') {
        adminPanel.style.display = 'block';
    } else {
        adminPanel.style.display = 'none';
    }
});

// Если сервер вернул ошибку (например, неверный пароль)
socket.on('registration_error', function(data) {
    alert(data.message);
});

// Кнопка Log_Out
logoutBtn.addEventListener('click', function() {
    socket.emit('logout_user');
    
    myNickname = "guest";
    document.getElementById('currentNick').textContent = "nickname: guest";
    openFormBtn.style.display = 'inline-block';
    changeNickBtn.style.display = 'none';
    logoutBtn.style.display = 'none';
    adminPanel.style.display = 'none';
    
    document.getElementById('nicknameInput').value = '';
    document.getElementById('passwordInput').value = '';
    
    // Снова прячем сообщения под заглушку
    messageList.innerHTML = '<div style="color: #666; font-style: italic;">Зайдите в аккаунт, чтобы увидеть все.</div>';
});

// Кнопка Change_Nick
changeNickBtn.addEventListener('click', function() {
    const newNick = prompt("Введите новый никнейм:", myNickname);
    if (newNick && newNick.trim() !== "") {
        socket.emit('change_nickname', { newNickname: newNick.trim() });
    }
});

// Успешное изменение ника
socket.on('nick_changed_success', function(data) {
    myNickname = data.newNickname;
    document.getElementById('currentNick').textContent = "nickname: " + myNickname;
    
    if (myNickname.toLowerCase() === 'iv') {
        adminPanel.style.display = 'block';
    } else {
        adminPanel.style.display = 'none';
    }
});

// Обновление списка онлайн-пользователей в столбик
socket.on('update_users', function(usersArray) {
    if (usersArray.length === 0) {
        usersListDisplay.innerHTML = "<div>*None</div>";
    } else {
        usersListDisplay.innerHTML = ""; 
        usersArray.forEach(function(user) {
            const userDiv = document.createElement('div');
            userDiv.textContent = `> ${user}`; 
            usersListDisplay.appendChild(userDiv);
        });
    }
});

// Отправка сообщений по кнопке SEND
document.getElementById('sendBroadcast').addEventListener('click', function() {
    const text = document.getElementById('broadcastInput').value.trim();
    if (text) {
        socket.emit('send_broadcast', { text: text });
        document.getElementById('broadcastInput').value = '';
    }
});

// Функция, которая красиво добавляет одну строчку на экран
function appendMessage(from, text) {
    if (messageList.textContent.includes('Зайдите в аккаунт') || messageList.textContent === 'Загрузка директив...') {
        messageList.innerHTML = '';
    }
    const msgDiv = document.createElement('div');
    msgDiv.textContent = `> ${from}: ${text}`; 
    messageList.appendChild(msgDiv);
    messageList.scrollTop = messageList.scrollHeight;
}

// Получение ОДНОГО нового сообщения в реальном времени
socket.on('receive_broadcast', function(data) {
    if (myNickname !== "guest") {
        appendMessage(data.from, data.text);
    }
});

// Получение ВСЕЙ ИСТОРИИ от сервера
socket.on('history_log', function(historyArray) {
    if (myNickname !== "guest") {
        if (historyArray.length > 0) {
            messageList.innerHTML = ''; 
            historyArray.forEach(function(msg) {
                appendMessage(msg.from, msg.text);
            });
        } else {
            messageList.innerHTML = 'Ожидание входящих директив...';
        }
    }
});
</script>
</body>
</html>
